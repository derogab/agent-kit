name: Publish @derogab/pi-git package

on:
  push:
    branches:
      - master
    paths:
      - plugins/git/package.json
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    defaults:
      run:
        working-directory: plugins/git

    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
          package-manager-cache: false
      - name: Build package
        run: |
          mkdir -p .npm-package/skills
          cp package.json README.md .npm-package/
          cp -LR skills/. .npm-package/skills/
      - run: npm pack .npm-package --dry-run
      - run: npm publish .npm-package --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
